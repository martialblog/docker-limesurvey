services:
  limesurvey:
    build:
      context: 6.0/apache/
      dockerfile: Dockerfile
    volumes:
      # TODO Update storage location as desired. All subdirectories of the `upload` may contain
      # data intended to be persistent (e.g. themes). `upload` host directory must already have the
      # base content from LimeSurvey on https://community.limesurvey.org/downloads/
      - ./lime-data/upload:/var/www/html/upload
    networks:
      - limesurvey-db
    ports:
      - "8080:8080"
    environment:
      - "DB_HOST=lime-db"
      # TODO set passwords
      # - "DB_PASSWORD="
      # - "ADMIN_PASSWORD="
      # If you require an empty table prefix, use a space as the DB_TABLE_PREFIX
      # - "DB_TABLE_PREFIX= "
  lime-db:
    image: mariadb:11.4
    networks:
      - limesurvey-db
    environment:
      - "MYSQL_USER=limesurvey"
      - "MYSQL_DATABASE=limesurvey"
      # TODO set passwords
      # - "MYSQL_PASSWORD="
      # - "MYSQL_ROOT_PASSWORD="

networks:
  limesurvey-db:
    driver: bridge
